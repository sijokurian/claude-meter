<title>Claude Meter</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 280px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    background: #fff;
    padding: 16px;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
    padding: 8px 10px;
    border-radius: 6px;
    background: #f5f5f5;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.ok { background: #22c55e; }
  .dot.err { background: #ef4444; }
  .dot.unknown { background: #a3a3a3; }
  .label { color: #666; }
  .value { font-weight: 500; }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
  }
  .section {
    margin-bottom: 12px;
  }
  .port-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .port-row input {
    width: 70px;
    padding: 4px 6px;
    border: 1px solid #d4d4d4;
    border-radius: 4px;
    font-size: 12px;
  }
  button {
    padding: 4px 10px;
    border: 1px solid #d4d4d4;
    border-radius: 4px;
    background: #fafafa;
    cursor: pointer;
    font-size: 12px;
  }
  button:hover { background: #f0f0f0; }
  .hint {
    color: #999;
    font-size: 11px;
    margin-top: 8px;
    line-height: 1.4;
  }
</style>

<h1>Claude Meter</h1>

<div class="status" id="status">
  <span class="dot unknown" id="dot"></span>
  <span id="statusText">Checking...</span>
</div>

<div class="section" id="usageSection" style="display:none">
  <div class="row">
    <span class="label">Web usage</span>
    <span class="value" id="pctValue">—</span>
  </div>
  <div class="row">
    <span class="label">Source</span>
    <span class="value" id="sourceValue">—</span>
  </div>
  <div class="row">
    <span class="label">Last sync</span>
    <span class="value" id="timeValue">—</span>
  </div>
</div>

<div class="section">
  <div class="port-row">
    <span class="label">Port:</span>
    <input type="number" id="portInput" value="52413" min="1024" max="65535">
    <button id="savePort">Save</button>
  </div>
</div>

<p class="hint">
  Open <strong>claude.ai</strong> in any tab. The extension automatically
  captures usage data and sends it to the tray app.
</p>

<script src="popup.js"></script>
